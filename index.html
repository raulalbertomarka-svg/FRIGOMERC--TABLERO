<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minerva · Price Intelligence · PrendasPYapp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* Estilos extraídos del formato original adjunto */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff; --gray-50:#f8fafc; --gray-100:#f1f5f9; --gray-200:#e2e8f0;
  --gray-800:#1e293b; --gray-900:#0f172a; --blue:#0ea5e9; --blue-light:#e0f2fe;
  --green:#10b981; --red:#ef4444; --amber:#f59e0b; --radius-lg:14px;
}
body{font-family:"Segoe UI",sans-serif;background:var(--gray-50);color:var(--gray-800);font-size:14px;min-height:100vh}

/* Sidebar Estilo Minerva */
.sidebar{position:fixed;top:0;left:0;height:100vh;width:220px;background:linear-gradient(180deg,#020617 0%,#0f172a 60%,#0c1a2e 100%);display:flex;flex-direction:column;z-index:200}
.sidebar-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,0.08)}
.logo-badge{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;padding:6px 10px;border-radius:7px;font-weight:700;font-size:11px}
.nav-section{font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;padding:15px 20px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--gray-400);background:none;border:none;width:100%;cursor:pointer;text-align:left;transition:all 0.2s}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav-item.active{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;box-shadow:0 4px 12px rgba(14,165,233,0.3)}

/* Topbar */
.topbar{position:fixed;top:0;left:220px;right:0;height:56px;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}

/* Contenedores */
.main{margin-left:220px;padding-top:56px}
.content{padding:24px;max-width:1440px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px;position:relative;box-shadow:var(--shadow-sm)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);border-radius:14px 14px 0 0}
.card{background:#fff;border:1px solid var(--gray-200);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow-sm)}

/* Tablas */
.tbl-wrap{overflow-x:auto;max-height:400px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--gray-50);padding:10px;text-align:left;position:sticky;top:0;z-index:1;font-weight:700;color:var(--gray-500);text-transform:uppercase}
tbody td{padding:10px;border-bottom:1px solid var(--gray-100)}

.pane{display:none}
.pane.active{display:block}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}

@media(max-width:900px){.sidebar{display:none}.topbar{left:0}.main{margin-left:0}}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-badge">⬡ MINERVA</div>
    <div style="color:#fff; font-size:13px; font-weight:600; margin-top:10px">Price Intelligence</div>
  </div>
  <div class="nav">
    <div class="nav-section">Resumen</div>
    <button class="nav-item active" onclick="sw('resumen')" id="nav-resumen">📊 RESUMEN GENERAL</button>
    <div class="nav-section">Análisis</div>
    <button class="nav-item" onclick="sw('precios')" id="nav-precios">💰 PRECIOS</button>
    <button class="nav-item" onclick="sw('competencia')" id="nav-competencia">⚔️ COMPETENCIA</button>
    <button class="nav-item" onclick="sw('cobertura')" id="nav-cobertura">🗺️ COBERTURA</button>
    <div class="nav-section">Operaciones</div>
    <button class="nav-item" onclick="sw('pedidos')" id="nav-pedidos">📦 PEDIDOS</button>
    <button class="nav-item" onclick="sw('locales')" id="nav-locales">📍 LOCALES</button>
    <button class="nav-item" onclick="sw('respuestas')" id="nav-respuestas">📋 RESPUESTAS</button>
  </div>
</nav>

<header class="topbar">
  <div>
    <div id="pageTitle" style="font-weight:700; font-size:16px">Resumen General</div>
    <div id="pageSubtitle" style="font-size:12px; color:var(--gray-400)">Sincronizando con la nube...</div>
  </div>
  <div style="display:flex;align-items:center;gap:15px">
    <span class="status-dot" id="connDot"></span>
    <button class="btn" style="padding:7px 14px; border-radius:8px; cursor:pointer" onclick="loadData(true)">ACTUALIZAR</button>
  </div>
</header>

<div class="main" id="stateWrap">
  <div class="content" style="text-align:center;padding-top:100px">
    <div id="loadMsg">Conectando con Google Sheets...</div>
  </div>
</div>

<div class="main" id="mainWrap" style="display:none">
  <div class="content">
    
    <div style="background:#fff; padding:12px; border:1px solid #e2e8f0; border-radius:10px; display:flex; gap:10px; margin-bottom:20px; align-items:center">
        <span style="font-size:11px; font-weight:700; color:#64748b">CORTE:</span>
        <select id="fCorte" onchange="applyFilters()" style="padding:5px; border-radius:6px; font-size:12px"></select>
        <span style="font-size:11px; font-weight:700; color:#64748b">CADENA:</span>
        <select id="fCadena" onchange="applyFilters()" style="padding:5px; border-radius:6px; font-size:12px"></select>
        <input type="text" id="fLocal" placeholder="Buscar local..." oninput="applyFilters()" style="padding:5px; border-radius:6px; font-size:12px; border:1px solid #e2e8f0">
    </div>

    <div class="pane active" id="pane-resumen">
      <div class="kpi-grid" id="kpiGrid"></div>
      <div style="display:grid; grid-template-columns: 2fr 1fr; gap:16px">
        <div class="card">
          <div style="padding:20px; font-weight:700; border-bottom:1px solid #f1f5f9">💰 Precio Promedio por Corte</div>
          <div style="padding:20px; height:300px"><canvas id="chPrecios"></canvas></div>
        </div>
        <div class="card" id="difPanel"></div>
      </div>
    </div>

    <div class="pane" id="pane-precios">
      <div class="card"><div class="tbl-wrap"><table><thead><tr id="preciosTblHead"></tr></thead><tbody id="tblPrecios"></tbody></table></div></div>
    </div>

    <div class="pane" id="pane-competencia">
      <div class="card"><div class="tbl-wrap" id="compTabla"></div></div>
    </div>

    <div class="pane" id="pane-cobertura">
      <div class="card"><div class="tbl-wrap"><table><thead><tr><th>LOCAL</th><th>CADENA</th><th>ESTADO</th><th>PRECIO MIN.</th><th>PRECIO COMP.</th></tr></thead><tbody id="tblCobCat"></tbody></table></div></div>
    </div>

    <div class="pane" id="pane-pedidos">
      <div class="card"><div class="tbl-wrap"><table><thead><tr id="pedidosTblHead"></tr></thead><tbody id="tblCruce"></tbody></table></div></div>
    </div>

    <div class="pane" id="pane-locales">
      <div class="card"><div class="card-body" id="localesContent"></div></div>
    </div>

    <div class="pane" id="pane-respuestas">
      <div class="card"><div class="tbl-wrap"><table><thead><tr id="respTblHead"></tr></thead><tbody id="tblResp"></tbody></table></div></div>
    </div>

  </div>
</div>

<script>
/* URLs exactas del formato adjunto */
const SHEET_URLS={
  locales: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSNckXvP0nhh8ZBmHOER3EfWO7y_PEaPfeLcEcWyKlNffuaW6tFDRpFkLWJnlsaMkY8FsbpScZsaIv6/pub?output=csv',
  pedidos: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjJfvWVC37EMGAlxG2qsxbiN2NcSs3pK_V5gPqLWdW1VIdaxPfrfh3tJPVXjrU5waeAOGSU-995d7u/pub?output=csv',
  competencia: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXRis6q-eyM8NhBokbtaXCJDu6tpU1U3MK51Q7aOtZWihsSejDLlb7wOoGKxQ1NDcYtjl1ISi0ti3x/pub?output=csv',
  respuestas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMgOxKbxLf61TNIiKKEegElOSvAz-dxHWgw591McciGAo1cZUpxw106K-1dM3eM_edxusFYal_AIuU/pub?output=csv',
};

const FRIGO_BRANDS=new Set(['MINERVA','PUL','ESTANCIA 92','FRIGOMERC','PUL SELECCION']);

let RAW=[], filtered=[], DS_RESPUESTAS={headers:[],rows:[]}, DS_LOCALES=[], DS_PEDIDOS=[];
let charts={};

async function fetchSecure(url) {
  const attempts = [url, `https://corsproxy.io/?${encodeURIComponent(url)}`, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` ];
  for (let a of attempts) {
    try {
      const r = await fetch(a, { cache: 'no-store' });
      if (r.ok) { const text = await r.text(); if (text.length > 100) return text; }
    } catch(e) {}
  }
  throw new Error("No se pudo conectar tras 3 intentos.");
}

function parseCSV(t) {
  const lines = t.split('\n').filter(l=>l.trim());
  const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  const rows = lines.slice(1).map(l => {
      let cells=[], cur='', inQ=false;
      for(let c of l){
          if(c==='"') inQ=!inQ;
          else if(c===',' && !inQ){ cells.push(cur.trim().replace(/"/g,'')); cur=''; }
          else cur+=c;
      }
      cells.push(cur.trim().replace(/"/g,''));
      return cells;
  });
  return {headers, rows};
}

async function loadData(manual=false) {
  if(manual) { document.getElementById('stateWrap').style.display='block'; document.getElementById('mainWrap').style.display='none'; }
  try {
    const csvTxt = await fetchSecure(SHEET_URLS.respuestas);
    DS_RESPUESTAS = parseCSV(csvTxt);
    
    const hi = k => DS_RESPUESTAS.headers.findIndex(h => new RegExp(k,'i').test(h));
    const LI=hi('local'), CI=hi('corte'), MI=hi('marca'), PI=hi('precio');

    RAW = DS_RESPUESTAS.rows.map(r => {
      const m = (r[MI]||'').toUpperCase();
      const esMinerva = Array.from(FRIGO_BRANDS).some(b => m.includes(b));
      return { 
        local: r[LI] || 'PDV', corte: r[CI] || 'Varios', 
        tipo: esMinerva ? 'FRIGO' : 'COMPETENCIA', 
        precio: parseFloat(String(r[PI]||'0').replace(/[^\d.]/g,'')) || 0,
        cadena: (r[LI]||'').toUpperCase().includes('BIGGIE') ? 'BIGGIE' : 'OTROS'
      };
    }).filter(r => r.precio > 0);

    filtered = RAW;
    populateFilters();
    renderCurrent();
    
    document.getElementById('stateWrap').style.display='none';
    document.getElementById('mainWrap').style.display='block';
    document.getElementById('connDot').className='status-dot';
    document.getElementById('pageSubtitle').textContent = `${RAW.length.toLocaleString()} registros sincronizados`;
  } catch(e) {
    document.getElementById('loadMsg').innerHTML = `<span style="color:red">${e.message}</span>`;
  }
}

function sw(t) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.id===`nav-${t}`));
  document.querySelectorAll('.pane').forEach(p => p.classList.toggle('active', p.id===`pane-${t}`));
  document.getElementById('pageTitle').textContent = t.toUpperCase();
  renderCurrent();
}

function renderCurrent() {
  const f = filtered.filter(r=>r.tipo==='FRIGO'), c = filtered.filter(r=>r.tipo==='COMPETENCIA');
  const avg = a => a.length ? a.reduce((s,v)=>s+v.precio,0)/a.length : 0;
  const pF = avg(f), pC = avg(c);

  if(document.getElementById('kpiGrid')) {
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card"><div>REGISTROS</div><div style="font-size:24px;font-weight:700">${filtered.length}</div></div>
      <div class="kpi-card"><div>MINERVA</div><div style="font-size:24px;font-weight:700">Gs. ${Math.round(pF).toLocaleString()}</div></div>
      <div class="kpi-card"><div>COMPETENCIA</div><div style="font-size:24px;font-weight:700">Gs. ${Math.round(pC).toLocaleString()}</div></div>
      <div class="kpi-card"><div>PDV</div><div style="font-size:24px;font-weight:700">${new Set(filtered.map(r=>r.local)).size}</div></div>
    `;
  }
  
  if(document.getElementById('chPrecios')) renderChart(f, c);
}

function renderChart(f, c) {
  const cuts = [...new Set(filtered.map(r=>r.corte))].slice(0,8);
  const getAvg = (arr, cut) => {
    const sub = arr.filter(r=>r.corte===cut);
    return sub.length ? Math.round(sub.reduce((s,v)=>s+v.precio,0)/sub.length) : 0;
  };
  const ctx = document.getElementById('chPrecios').getContext('2d');
  if(charts.main) charts.main.destroy();
  charts.main = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: cuts,
      datasets: [
        { label: 'Minerva', data: cuts.map(k=>getAvg(f,k)), backgroundColor: '#0ea5e9' },
        { label: 'Competencia', data: cuts.map(k=>getAvg(c,k)), backgroundColor: '#cbd5e1' }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

function populateFilters(){
  const sel = (id, arr) => {
    const s = document.getElementById(id);
    const val = s.value;
    s.innerHTML = '<option value="">Todos</option>';
    [...new Set(arr)].sort().forEach(v => {
      const o = document.createElement('option'); o.value=v; o.textContent=v; s.appendChild(o);
    });
    s.value = val;
  };
  sel('fCorte', RAW.map(r=>r.corte));
  sel('fCadena', RAW.map(r=>r.cadena));
}

function applyFilters() {
  const c = document.getElementById('fCorte').value;
  const cad = document.getElementById('fCadena').value;
  const l = document.getElementById('fLocal').value.toLowerCase();
  filtered = RAW.filter(r => (!c || r.corte===c) && (!cad || r.cadena===cad) && (!l || r.local.toLowerCase().includes(l)));
  renderCurrent();
}

loadData();
</script>
</body>
</html>
