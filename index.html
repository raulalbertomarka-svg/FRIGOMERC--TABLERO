<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minerva · Price Intelligence · PrendasPYapp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════
   ESTILOS ORIGINALES COMPLETOS
═══════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;
  --gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;
  --gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;
  --gray-800:#1e293b;--gray-900:#0f172a;
  --blue:#0ea5e9;--blue-light:#e0f2fe;--blue-dark:#0284c7;
  --green:#10b981;--green-light:#ecfdf5;--green-dark:#047857;
  --red:#ef4444;--red-light:#fef2f2;
  --amber:#f59e0b;--amber-light:#fffbeb;
  --purple:#8b5cf6;--purple-light:#f5f3ff;
  --indigo:#6366f1;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow:0 4px 6px rgba(0,0,0,.07);
  --shadow-md:0 8px 16px rgba(0,0,0,.08);
  --radius:10px;--radius-lg:14px;
}
html{scroll-behavior:smooth}
body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-800);font-size:14px;line-height:1.5;min-height:100vh}
body.dark{--gray-50:#0f172a;--gray-100:#1e293b;--gray-200:#334155;--gray-300:#475569;--gray-400:#64748b;--gray-500:#94a3b8;--gray-600:#cbd5e1;--gray-700:#e2e8f0;--gray-800:#f1f5f9;--gray-900:#f8fafc;--white:#1e293b}

.sidebar{position:fixed;top:0;left:0;height:100vh;width:220px;background:linear-gradient(180deg,#020617 0%,#0f172a 60%,#0c1a2e 100%);display:flex;flex-direction:column;z-index:200;transition:transform .25s}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;padding:6px 10px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.04em}
.logo-client{margin-top:10px;font-size:13px;font-weight:600;color:#fff;letter-spacing:.01em}
.logo-sub{font-size:11px;color:var(--gray-400);margin-top:2px}
.nav{flex:1;padding:16px 10px;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.08em;padding:0 10px 8px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--gray-400);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;box-shadow:0 4px 12px rgba(14,165,233,.3)}
.nav-item .ni{font-size:16px;width:20px;text-align:center;flex-shrink:0}

.topbar{position:fixed;top:0;left:220px;right:0;height:56px;background:var(--white);border-bottom:1px solid var(--gray-200);box-shadow:0 1px 20px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.page-title{font-size:16px;font-weight:700;color:var(--gray-800);white-space:nowrap}
.page-subtitle{font-size:12px;color:var(--gray-400);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hamburger{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-600);padding:4px 8px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--gray-200);background:var(--white);color:var(--gray-600);cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:all .15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;box-shadow:0 4px 12px rgba(14,165,233,.35)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block}
.status-dot.offline{background:var(--red)}
.lupd{font-size:11px;color:var(--gray-400)}

.main{margin-left:220px;padding-top:56px;min-height:100vh}
.content{padding:24px;max-width:1440px}

.fbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius);padding:10px 14px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.fbar-label{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.05em}
.fbar select,.fbar input{font-size:12px;padding:5px 9px;border-radius:7px;border:1px solid var(--gray-200);background:var(--gray-50);color:var(--gray-700);outline:none}

.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-color,var(--blue));border-radius:14px 14px 0 0}
.kpi-label{font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:800;color:var(--gray-900);line-height:1}

.card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--gray-100)}
.card-title{font-size:13px;font-weight:700;color:var(--gray-800);display:flex;align-items:center;gap:8px}

.tbl-wrap{overflow-x:auto;overflow-y:auto;max-height:450px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--gray-50);color:var(--gray-500);font-size:10px;font-weight:700;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:1}
tbody td{padding:9px 12px;border-bottom:1px solid var(--gray-100);color:var(--gray-700)}

.pane{display:none}
.pane.active{display:block}

.loading{display:flex;align-items:center;gap:12px;color:var(--gray-500);font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:900px){
  .hamburger{display:block}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .topbar{left:0}.main{margin-left:0}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-badge">⬡ MINERVA</div>
    <div class="logo-client">Price Intelligence</div>
    <div class="logo-sub">PrendasPYapp</div>
  </div>
  <div class="nav">
    <div class="nav-section">Resumen</div>
    <button class="nav-item active" onclick="sw('resumen')" id="nav-resumen"><span class="ni">📊</span> RESUMEN GENERAL</button>
    <div class="nav-section">Análisis</div>
    <button class="nav-item" onclick="sw('precios')" id="nav-precios"><span class="ni">💰</span> PRECIOS</button>
    <button class="nav-item" onclick="sw('competencia')" id="nav-competencia"><span class="ni">⚔️</span> COMPETENCIA</button>
    <button class="nav-item" onclick="sw('respuestas')" id="nav-respuestas"><span class="ni">📋</span> RESPUESTAS</button>
  </div>
</nav>

<header class="topbar">
  <div class="topbar-left">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div>
      <div class="page-title" id="pageTitle">Resumen General</div>
      <div class="page-subtitle" id="pageSubtitle">Sincronizando datos...</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="status-dot" id="connDot"></span>
    <span class="lupd" id="lupd"></span>
    <button class="btn btn-primary" onclick="loadData(true)">ACTUALIZAR</button>
  </div>
</header>

<div class="main" id="stateWrap">
  <div class="content" style="display:flex;align-items:center;justify-content:center;min-height:80vh">
    <div class="loading"><div class="spinner"></div><span id="loadMsg">Estableciendo conexión segura con Google Sheets...</span></div>
  </div>
</div>

<div class="main" id="mainWrap" style="display:none">
  <div class="content">
    <div class="fbar">
      <span class="fbar-label">Corte</span>
      <select id="fCorte" onchange="applyFilters()"><option value="">Todos</option></select>
      <span class="fbar-label">Cadena</span>
      <select id="fCadena" onchange="applyFilters()"><option value="">Todas</option></select>
      <input type="text" id="fLocal" placeholder="Buscar PDV..." oninput="applyFilters()">
    </div>

    <div class="pane active" id="pane-resumen">
      <div class="kpi-grid" id="kpiGrid"></div>
      <div class="card">
        <div class="card-header"><div class="card-title">Distribución de Precios (Minerva vs Otros)</div></div>
        <div class="card-body"><div style="height:350px"><canvas id="chPrecios"></canvas></div></div>
      </div>
    </div>

    <div class="pane" id="pane-precios">
        <div class="card"><div class="card-body np"><div class="tbl-wrap"><table><thead><tr id="preciosTblHead"></tr></thead><tbody id="tblPrecios"></tbody></table></div></div></div>
    </div>

    <div class="pane" id="pane-respuestas">
        <div class="card"><div class="card-body np"><div class="tbl-wrap"><table><thead><tr id="respTblHead"></tr></thead><tbody id="tblResp"></tbody></table></div></div></div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   SISTEMA DE REDUNDANCIA DE CARGA (ANTIFALLO)
═══════════════════════════════════════════════════════ */
const SHEET_URLS = {
  respuestas: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMgOxKbxLf61TNIiKKEegElOSvAz-dxHWgw591McciGAo1cZUpxw106K-1dM3eM_edxusFYal_AIuU/pub?output=csv',
  locales:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vSNckXvP0nhh8ZBmHOER3EfWO7y_PEaPfeLcEcWyKlNffuaW6tFDRpFkLWJnlsaMkY8FsbpScZsaIv6/pub?output=csv',
  pedidos:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjJfvWVC37EMGAlxG2qsxbiN2NcSs3pK_V5gPqLWdW1VIdaxPfrfh3tJPVXjrU5waeAOGSU-995d7u/pub?output=csv'
};

const FRIGO_BRANDS = new Set(['PUL', 'PUL SELECCION', 'PUL REGULAR', 'ESTANCIA 92', 'ESTANCIA 92 ANGUS']);

let RAW=[], filtered=[], DS_RESPUESTAS={headers:[], rows:[]};
let charts={};

/**
 * Función que intenta cargar datos usando múltiples estrategias
 * Resuelve errores de CORS y Timeouts 408
 */
async function fetchSheetSecure(url) {
    const proxies = [
        url, // Intento directo
        `https://corsproxy.io/?${encodeURIComponent(url)}`, // Proxy 1
        `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, // Proxy 2
        `https://thingproxy.freeboard.io/fetch/${url}` // Proxy 3
    ];

    for (let proxyUrl of proxies) {
        try {
            console.log("Intentando descargar desde:", proxyUrl.slice(0, 50));
            const response = await fetch(proxyUrl, { 
                method: 'GET',
                cache: 'no-store'
            });
            
            if (response.ok) {
                const text = await response.text();
                // Verificamos que no sea una página de error o HTML
                if (text.length > 500 && !text.trim().startsWith('<!DOCTYPE')) {
                    return text;
                }
            }
        } catch (e) {
            console.warn("Fallo en el intento con el servidor:", proxyUrl.split('/')[2]);
        }
    }
    throw new Error("Error: Los servidores están saturados. Por favor, refresca la página o intenta de nuevo en unos minutos.");
}

function parseCSV(text){
    const lines = text.split('\n').filter(l=>l.trim());
    if(!lines.length) return {headers:[], rows:[]};
    const headers = lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    const rows = lines.slice(1).map(l => {
        let cells=[], cur='', inQ=false;
        for(let c of l){
            if(c==='"') inQ=!inQ;
            else if(c===',' && !inQ){ cells.push(cur.trim()); cur=''; }
            else cur+=c;
        }
        cells.push(cur.trim());
        return cells;
    });
    return {headers, rows};
}

async function loadData(manual=false){
    if(manual) {
        document.getElementById('stateWrap').style.display='block';
        document.getElementById('mainWrap').style.display='none';
    }
    document.getElementById('loadMsg').textContent = "Recuperando registros desde el servidor...";

    try {
        const csvText = await fetchSheetSecure(SHEET_URLS.respuestas);
        DS_RESPUESTAS = parseCSV(csvText);
        
        RAW = processMainData(DS_RESPUESTAS);
        filtered = RAW;

        populateFilters();
        renderCurrent();

        document.getElementById('stateWrap').style.display='none';
        document.getElementById('mainWrap').style.display='block';
        document.getElementById('connDot').className = 'status-dot';
        document.getElementById('lupd').textContent = new Date().toLocaleTimeString();
        document.getElementById('pageSubtitle').textContent = `${RAW.length.toLocaleString()} registros sincronizados`;
    } catch(e) {
        document.getElementById('loadMsg').innerHTML = `<b style="color:var(--red)">CONEXIÓN INTERRUMPIDA</b><br><small>${e.message}</small><br><button onclick="loadData(true)" class="btn btn-primary" style="margin-top:15px">REINTENTAR CARGA</button>`;
        document.getElementById('connDot').className = 'status-dot offline';
    }
}

function processMainData(sheet){
    const {headers, rows} = sheet;
    const hi = k => headers.findIndex(h => new RegExp(k,'i').test(h));
    
    // Columnas automáticas
    const LI=hi('local|sucursal|tienda'), CI=hi('corte|producto'), MI=hi('marca'), PI=hi('precio|valor|monto');

    return rows.map(r => {
        const local = r[LI] || 'PDV Desconocido', corte = r[CI] || 'Varios';
        const marca = (r[MI] || 'Competencia').toUpperCase();
        const precio = parseFloat(String(r[PI]||'0').replace(/[^\d.]/g,'')) || 0;
        
        // Lógica de marcas Minerva solicitada
        const esFrigo = Array.from(FRIGO_BRANDS).some(b => marca.includes(b) || corte.toUpperCase().includes(b));
        
        return { 
            local, 
            corte, 
            marca: esFrigo ? 'Minerva' : marca, 
            tipo: esFrigo ? 'FRIGO' : 'COMPETENCIA', 
            precio, 
            cadena: extractCadena(local) 
        };
    }).filter(r => r.precio > 5000);
}

function extractCadena(s){
    const u = s.toUpperCase();
    if(u.includes('BIGGIE')) return 'BIGGIE';
    if(u.includes('STOCK')) return 'STOCK';
    if(u.includes('SUPERSEIS') || u.includes('S6')) return 'SUPERSEIS';
    return 'OTROS';
}

function renderResumen(){
    const f = filtered.filter(r=>r.tipo==='FRIGO'), c = filtered.filter(r=>r.tipo==='COMPETENCIA');
    const avg = arr => arr.length ? arr.reduce((a,b)=>a+b.precio,0)/arr.length : 0;
    const pF = avg(f), pC = avg(c);

    document.getElementById('kpiGrid').innerHTML = `
        <div class="kpi-card" style="--kpi-color:#0ea5e9"><div class="kpi-label">TOTAL REGISTROS</div><div class="kpi-value">${filtered.length.toLocaleString()}</div></div>
        <div class="kpi-card" style="--kpi-color:#10b981"><div class="kpi-label">PRECIO MINERVA</div><div class="kpi-value">${Math.round(pF).toLocaleString()} Gs.</div></div>
        <div class="kpi-card" style="--kpi-color:#94a3b8"><div class="kpi-label">PRECIO COMPETENCIA</div><div class="kpi-value">${Math.round(pC).toLocaleString()} Gs.</div></div>
        <div class="kpi-card" style="--kpi-color:#f59e0b"><div class="kpi-label">PUNTOS RELEVADOS</div><div class="kpi-value">${new Set(filtered.map(r=>r.local)).size}</div></div>
    `;

    renderChart(f, c);
}

function renderChart(f, c){
    const cuts = [...new Set(filtered.map(r=>r.corte))].slice(0,10);
    const getAvg = (arr, cut) => {
        const sub = arr.filter(r=>r.corte===cut);
        return sub.length ? Math.round(sub.reduce((a,b)=>a+b.precio,0)/sub.length) : 0;
    };

    const ctx = document.getElementById('chPrecios').getContext('2d');
    if(charts.main) charts.main.destroy();
    charts.main = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: cuts,
            datasets: [
                { label: 'Minerva', data: cuts.map(k=>getAvg(f,k)), backgroundColor: '#0ea5e9', borderRadius: 5 },
                { label: 'Competencia', data: cuts.map(k=>getAvg(c,k)), backgroundColor: '#cbd5e1', borderRadius: 5 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { ticks: { callback: v => v.toLocaleString() + ' Gs.' } } }
        }
    });
}

function populateFilters(){
    const sel = (id, arr) => {
        const s = document.getElementById(id);
        const cur = s.value;
        s.innerHTML = '<option value="">Todos</option>';
        [...new Set(arr)].sort().forEach(v => {
            const o = document.createElement('option'); o.value=v; o.textContent=v; s.appendChild(o);
        });
        s.value = cur;
    };
    sel('fCorte', RAW.map(r=>r.corte));
    sel('fCadena', RAW.map(r=>r.cadena));
}

function applyFilters(){
    const corte = document.getElementById('fCorte').value;
    const cadena = document.getElementById('fCadena').value;
    const busca = document.getElementById('fLocal').value.toLowerCase();
    filtered = RAW.filter(r => 
        (!corte || r.corte===corte) && 
        (!cadena || r.cadena===cadena) && 
        (!busca || r.local.toLowerCase().includes(busca))
    );
    renderCurrent();
}

function sw(t){
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-'+t).classList.add('active');
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById('pane-'+t).classList.add('active');
    activeTab = t;
    renderCurrent();
}

function renderCurrent(){
    if(activeTab==='resumen') renderResumen();
    if(activeTab==='respuestas') {
        document.getElementById('respTblHead').innerHTML = DS_RESPUESTAS.headers.map(h => `<th>${h}</th>`).join('');
        document.getElementById('tblResp').innerHTML = DS_RESPUESTAS.rows.slice(0,200).map(r => `<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
    }
}

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

let activeTab = 'resumen';
loadData();
</script>
</body>
</html>
